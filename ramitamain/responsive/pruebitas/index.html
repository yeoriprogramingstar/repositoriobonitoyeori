<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= HEADER / ENCABEZADO ================= -->
<!-- Contiene logo, menú y hamburguesa -->
<header class="encabezado">

    <div class="logo">TU LOGO</div>

    <!-- Checkbox invisible que controla el menú -->
    <input type="checkbox" id="menu-toggle">

    <!-- Icono hamburguesa -->
    <label for="menu-toggle" class="menu-icono">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <!-- Menú de navegación -->
    <nav class="menu">
        <a href="#">Inicio</a>
        <a href="#">Características</a>
        <a href="#">Galería</a>
        <a href="#">Contacto</a>
    </nav>

</header>


<!-- ================= PORTADA (HERO) ================= -->
<!-- Sección principal con texto + imagen -->
<section class="portada">

    <div class="portada-contenido">
        <h1>PLANTILLA DE DISEÑO WEB</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button>Comenzar</button>
    </div>

    <div class="portada-imagen"></div>

</section>


<!-- ================= CARACTERÍSTICAS ================= -->
<!-- Muestra beneficios en forma de tarjetas -->
<section class="caracteristicas">

    <h2>Características</h2>

    <div class="caracteristicas-grid">

        <div class="caracteristica">
            <div class="circulo"></div>
            <p>Lorem ipsum</p>
        </div>

        <div class="caracteristica">
            <div class="circulo"></div>
            <p>Lorem ipsum</p>
        </div>

        <div class="caracteristica">
            <div class="circulo"></div>
            <p>Lorem ipsum</p>
        </div>

    </div>

</section>


<!-- ================= VIDEO ================= -->
<!-- Simula un video o contenido multimedia -->
<section class="video">
    <div class="video-caja">▶</div>
</section>


<!-- ================= INFORMACIÓN ================= -->
<!-- Dos bloques de contenido -->
<section class="informacion">
    <div class="tarjeta-info">Información 1</div>
    <div class="tarjeta-info">Información 2</div>
</section>


<!-- ================= GALERÍA ================= -->
<!-- Muestra imágenes en grid -->
<section class="galeria">

    <h2>Galería</h2>

    <div class="galeria-grid">
        <div></div>
        <div></div>
        <div></div>
    </div>

</section>


<!-- ================= LLAMADO A LA ACCIÓN ================= -->
<!-- Sección destacada para captar atención -->
<section class="llamado-accion">
    <h2>Texto llamativo aquí</h2>
    <button>Comenzar</button>
</section>


<!-- ================= ARTÍCULOS ================= -->
<!-- Sección tipo blog o contenido -->
<section class="articulos">

    <h2>Artículos</h2>

    <div class="articulos-grid">
        <div class="articulo"></div>
        <div class="articulo"></div>
    </div>

</section>


<!-- ================= MAPA ================= -->
<!-- Ubicación o mapa -->
<section class="mapa">
    <div class="mapa-caja">📍</div>
</section>


<!-- ================= FOOTER ================= -->
<!-- Pie de página -->
<footer class="pie">
    <p>© 2026 - TU LOGO</p>
</footer>

</body>
</html>
